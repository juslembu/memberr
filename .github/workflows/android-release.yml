name: Build & release Android APK

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125"

      - name: Prebuild native Android project
        working-directory: apps/mobile
        run: CI=1 pnpm exec expo prebuild --platform android --no-install

      - name: Decode release keystore
        working-directory: apps/mobile
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Apply release signing config
        working-directory: apps/mobile
        env:
          MEMBERR_KEYSTORE_PATH: release.keystore
          MEMBERR_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MEMBERR_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MEMBERR_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: node scripts/apply-release-signing.mjs

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          MEMBERR_KEYSTORE_PATH: release.keystore
          MEMBERR_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MEMBERR_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MEMBERR_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p release-out
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "release-out/memberr-${GITHUB_REF_NAME}.apk"

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/memberr-*.apk
          fail_on_unmatched_files: true
