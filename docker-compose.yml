services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: memberr
      POSTGRES_USER: memberr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memberr"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    # Prebuilt image self-hosters can pull instead of building locally (`docker compose pull api`).
    # `build:` is kept so `pnpm deploy:api` / local development still build from source.
    image: ghcr.io/juslembu/memberr-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://memberr:${POSTGRES_PASSWORD:-changeme}@postgres:5432/memberr
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production_min32}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_in_prod_min32}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081,http://localhost:3000}
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
